x-nanobot-common: &nanobot-common
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - .env
  cap_drop:
    - ALL
  cap_add:
    - SYS_ADMIN
  security_opt:
    - apparmor=unconfined
    - seccomp=unconfined
  restart: unless-stopped
  deploy:
    resources:
      limits:
        cpus: "1"
        memory: 1G
      reservations:
        cpus: "0.25"
        memory: 256M

services:
  # Admin bot — campaign managers, list distribution, volunteer oversight
  nanobot-admin:
    container_name: nanobot-admin
    <<: *nanobot-common
    command: ["gateway", "--config", "/home/nanobot/.nanobot-admin/config.json"]
    ports:
      - 18790:18790
    volumes:
      - ~/.nanobot-admin:/home/nanobot/.nanobot-admin

  # Volunteer bot — field workers, list access, result submission
  nanobot-volunteer:
    container_name: nanobot-volunteer
    <<: *nanobot-common
    command: ["gateway", "--config", "/home/nanobot/.nanobot-volunteer/config.json"]
    ports:
      - 18791:18791
    volumes:
      - ~/.nanobot-volunteer:/home/nanobot/.nanobot-volunteer

  nanobot-api:
    container_name: nanobot-api
    <<: *nanobot-common
    volumes:
      - ~/.nanobot:/home/nanobot/.nanobot
    command:
      ["serve", "--host", "0.0.0.0", "-w", "/home/nanobot/.nanobot/api-workspace"]
    ports:
      - 127.0.0.1:8900:8900

  nanobot-cli:
    <<: *nanobot-common
    volumes:
      - ~/.nanobot:/home/nanobot/.nanobot
    profiles:
      - cli
    command: ["status"]
    stdin_open: true
    tty: true
